[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openforge-cli"
version = "0.1.0"
description = "OpenForge EDA command-line interface"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "openforge-core",
    "typer[all]>=0.12",
    "rich>=13",
]

[project.scripts]
openforge = "openforge_cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/openforge_cli"]
