[project]
name = "openforge-core"
version = "0.1.0"
description = "OpenForge EDA core orchestration library"
requires-python = ">=3.12"
license = "GPL-3.0-or-later"
authors = [{ name = "Dyber Inc.", email = "engineering@dyber.io" }]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "jinja2>=3.1",
    "docker>=7.0",
    "networkx>=3.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openforge"]
