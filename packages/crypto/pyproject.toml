[project]
name = "openforge-crypto"
version = "0.1.0"
description = "OpenForge EDA cryptographic verification and side-channel analysis"
requires-python = ">=3.12"
license = "GPL-3.0-or-later"
authors = [{ name = "Dyber Inc.", email = "engineering@dyber.io" }]
dependencies = [
    "openforge-core",
    "numpy>=1.26",
    "scipy>=1.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openforge_crypto"]
