version: "3.9"

services:
  # PostgreSQL for project metadata
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openforge
      POSTGRES_USER: openforge
      POSTGRES_PASSWORD: openforge_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # MinIO for object storage (waveforms, logs)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: openforge
      MINIO_ROOT_PASSWORD: openforge_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # TimescaleDB for metrics and time-series data
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: openforge_metrics
      POSTGRES_USER: openforge
      POSTGRES_PASSWORD: openforge_dev
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  minio_data:
  timescale_data:
