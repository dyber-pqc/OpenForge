name: asic-picorv32-sky130
version: "1"
kind: asic
top_module: picorv32

rtl_sources:
  - rtl/picorv32.v
constraint_files:
  - constraints/picorv32.sdc
tb_sources:
  - tb/picorv32_tb.v

pdk:
  name: sky130A
  std_cell_lib: sky130_fd_sc_hd
  variant: sky130_fd_sc_hd

target:
  kind: asic
  vendor: skywater

corners:
  - name: tt_025C_1v80
    process: tt
    voltage: 1.80
    temperature: 25.0
    lib_files:
      - $PDK_ROOT/sky130A/libs.ref/sky130_fd_sc_hd/lib/sky130_fd_sc_hd__tt_025C_1v80.lib

  - name: ss_n40C_1v60
    process: ss
    voltage: 1.60
    temperature: -40.0
    lib_files:
      - $PDK_ROOT/sky130A/libs.ref/sky130_fd_sc_hd/lib/sky130_fd_sc_hd__ss_n40C_1v60.lib

  - name: ff_125C_1v95
    process: ff
    voltage: 1.95
    temperature: 125.0
    lib_files:
      - $PDK_ROOT/sky130A/libs.ref/sky130_fd_sc_hd/lib/sky130_fd_sc_hd__ff_100C_1v95.lib

runs:
  - stage: lint
    tool: verilator
    options:
      mode: lint-only

  - stage: synth
    tool: yosys
    options:
      target: sky130
      liberty: $PDK_ROOT/sky130A/libs.ref/sky130_fd_sc_hd/lib/sky130_fd_sc_hd__tt_025C_1v80.lib
      abc_script: strash; ifraig; scorr; dc2; dretime; strash; &get -n; &dch -f; &nf {D}; &put
    depends_on:
      - lint

  - stage: floorplan
    tool: openroad
    options:
      step: floorplan
      # PicoRV32 synthesises to ~7.9k cells on sky130_fd_sc_hd. At 0.55 util
      # TritonRoute fails to converge (~15k DRC violations stuck across iters).
      # Drop to 0.30 utilization and a ~506x506 µm die to give the router enough
      # routing track headroom to reach a writable routed.def.
      # Note: full_flow.py currently hard-codes -utilization from FullFlowConfig
      # (default 50.0 = 50% percent — OpenROAD interprets 50.0 as PERCENT, not
      # ratio). The tcl in build/floorplan/floorplan.tcl is patched to 30.0 to
      # land at the calmer density. Tracking this as a flow gap.
      die_area: [0, 0, 506, 506]
      core_area: [20, 20, 486, 486]
      site: unithd
      utilization: 0.30
    depends_on:
      - synth

  - stage: place
    tool: openroad
    options:
      step: global_place
      density: 0.40
    depends_on:
      - floorplan

  - stage: cts
    tool: openroad
    options:
      step: clock_tree_synthesis
      buf_cell: sky130_fd_sc_hd__clkbuf_4
      root_buf: sky130_fd_sc_hd__clkbuf_16
    depends_on:
      - place

  - stage: route
    tool: openroad
    options:
      step: global_route
    depends_on:
      - cts

  - stage: detail_route
    tool: openroad
    options:
      step: detail_route
      # Cap TritonRoute optimisation iterations so a writable routed.def lands
      # in bounded time even if violations don't fully converge. With droute=6
      # picorv32 finishes in ~10-15 minutes on a typical workstation.
      droute_end_iter: 6
    depends_on:
      - route

  - stage: sta
    tool: opensta
    options:
      corner: tt_025C_1v80
      sdc: constraints/picorv32.sdc
    depends_on:
      - detail_route

  - stage: drc
    tool: magic
    options:
      tech_file: $PDK_ROOT/sky130A/libs.tech/magic/sky130A.tech
    depends_on:
      - detail_route

  - stage: lvs
    tool: netgen
    options:
      setup_file: $PDK_ROOT/sky130A/libs.tech/netgen/sky130A_setup.tcl
    depends_on:
      - drc

  - stage: gds
    tool: magic
    options:
      step: gds_export
      tech_file: $PDK_ROOT/sky130A/libs.tech/magic/sky130A.tech
    depends_on:
      - lvs

metadata:
  description: PicoRV32 RISC-V CPU - full ASIC RTL-to-GDS flow on SkyWater sky130
  author: OpenForge Examples
  license: Apache-2.0 (PicoRV32 is ISC; see rtl/picorv32.v header)
  target_freq_mhz: 50
