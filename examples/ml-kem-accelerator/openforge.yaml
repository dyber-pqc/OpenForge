# ML-KEM (CRYSTALS-Kyber) Hardware Accelerator
# Full crypto verification flow example
project:
  name: "ml-kem-accelerator"
  top_module: "mlkem_top"
  target_pdk: "sky130"

design:
  sources:
    - src/rtl/*.sv
  includes:
    - src/include/
  constraints:
    - constraints/timing.sdc

verification:
  simulation:
    tool: verilator
    testbenches:
      - tb/ntt_tb.py
      - tb/mlkem_keygen_tb.py
      - tb/mlkem_encaps_tb.py
    coverage:
      line: true
      toggle: true
      fsm: true

  formal:
    tool: symbiyosys
    properties:
      - formal/ntt_properties.sv
      - formal/fsm_properties.sv
      - formal/key_handling.sv
    depth: 100

  crypto_verification:
    constant_time:
      enabled: true
      secrets:
        - "secret_key"
        - "seed_d"
        - "seed_z"
      public:
        - "ciphertext"
        - "encaps_key"
        - "public_key"

    side_channel:
      enabled: true
      power_model: hamming_distance
      tvla_threshold: 4.5
      num_traces: 10000

    fips_compliance:
      enabled: true
      level: "2"
      checks:
        - key_zeroization
        - self_test_coverage
        - error_handling
        - rng_health_tests

    ntt_validation:
      enabled: true
      standard: "kyber"
      exhaustive_test: true

analysis:
  timing:
    tool: opensta
    clock_period: 5.0
