name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  # ========================================================================
  # Python: lint + format
  # ========================================================================
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/
      - run: ruff format --check packages/

  # ========================================================================
  # Python: AST parse check (catches syntax errors across all .py files)
  # ========================================================================
  ast-check:
    name: AST Parse Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check all Python files parse
        run: |
          python -c "
          import ast, pathlib, sys
          fails = 0
          for f in pathlib.Path('packages').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except Exception as exc:
                  print(f'FAIL {f}: {exc}')
                  fails += 1
          print(f'{fails} failures')
          sys.exit(fails)
          "

  # ========================================================================
  # Python: type check + import verification
  # ========================================================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages
        run: |
          pip install pydantic pyyaml numpy typer rich
          pip install -e packages/core -e packages/cli 2>/dev/null || true
      - name: Verify imports
        env:
          PYTHONPATH: "packages/core/src:packages/cli/src"
        run: |
          python -c "import openforge; print('core OK')"
          python -c "import openforge_cli; print('cli OK')"

  # ========================================================================
  # Python: tests (matrix 3.12 + 3.13)
  # ========================================================================
  python-test:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: python-lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pydantic pyyaml numpy pytest pytest-cov typer rich
          pip install -e packages/core -e packages/cli 2>/dev/null || \
          PYTHONPATH="packages/core/src:packages/cli/src" python -c "import openforge; print('OK')"

      - name: Run unit tests
        env:
          PYTHONPATH: "packages/core/src:packages/cli/src"
        run: |
          pytest packages/core/tests/ -v --tb=short --junitxml=test-results.xml 2>/dev/null || \
          pytest tests/ -v --tb=short --junitxml=test-results.xml 2>/dev/null || \
          echo "No tests found yet"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            test-results.xml
            coverage.xml
          retention-days: 5
          if-no-files-found: ignore

  # ========================================================================
  # Desktop: smoke test (headless Qt)
  # ========================================================================
  desktop-smoke:
    name: Desktop Smoke Test
    runs-on: ubuntu-latest
    needs: python-lint
    continue-on-error: true  # PySide6 can SIGABRT on headless CI runners
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libgl1 libglib2.0-0 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install packages
        run: |
          pip install pydantic pyyaml numpy PySide6
          pip install -e packages/core -e packages/desktop 2>/dev/null || \
          echo "Editable install failed, using PYTHONPATH"
        env:
          PYTHONPATH: "packages/core/src:packages/desktop/src:packages/cli/src"

      - name: Smoke test desktop
        env:
          QT_QPA_PLATFORM: offscreen
          OPENFORGE_SKIP_FIRST_RUN: "1"
          PYTHONPATH: "packages/core/src:packages/desktop/src:packages/cli/src"
        run: |
          xvfb-run python -c "
          from openforge_desktop.mainwindow import MainWindow
          from PySide6.QtWidgets import QApplication, QDockWidget
          app = QApplication([])
          w = MainWindow()
          docks = len(w.findChildren(QDockWidget))
          print(f'OK: {docks} docks, theme={w._current_theme}')
          "

  # ========================================================================
  # Rust: fmt + clippy + test
  # ========================================================================
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    continue-on-error: true  # Rust tools are WIP
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all --verbose

  # ========================================================================
  # Rust: build release binaries (verify they compile)
  # ========================================================================
  rust-build:
    name: Rust Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Build release
        run: cargo build --release

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-build-${{ matrix.os }}
          path: |
            target/release/openforge-ct*
            target/release/openforge-sca*
            target/release/openforge-entropy*
            target/release/openforge-lint*
            target/release/openforge-wave*
            !target/release/*.d
            !target/release/*.pdb
          retention-days: 3

  # ========================================================================
  # Svelte: type check + lint + build
  # ========================================================================
  svelte-check:
    name: Svelte Check
    runs-on: ubuntu-latest
    continue-on-error: true  # Web frontend is WIP
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Install dependencies
        working-directory: packages/web
        run: npm ci

      - name: Type check
        working-directory: packages/web
        run: npm run check

      - name: Lint
        working-directory: packages/web
        run: npm run lint || true

      - name: Build
        working-directory: packages/web
        run: npm run build

      - name: Run tests
        working-directory: packages/web
        run: npm run test -- --run || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: packages/web/build/
          retention-days: 3

  # ========================================================================
  # Docker: build and verify the container
  # ========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [python-lint, ast-check]
    continue-on-error: true  # Docker builds are heavy and may timeout on free runners
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t openforge-eda -f installer/Dockerfile . --no-cache
        timeout-minutes: 15

      - name: Verify Python imports inside container
        if: success()
        run: |
          docker run --rm --entrypoint python3 openforge-eda -c "
          import openforge; print('core:', openforge.__file__)
          " || docker run --rm --entrypoint python3.12 openforge-eda -c "
          import openforge; print('core OK')
          "

  # ========================================================================
  # Integration: verify all packages work together
  # ========================================================================
  integration:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: [python-test, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          pip install pydantic pyyaml numpy typer rich networkx scipy matplotlib
          pip install -e packages/core -e packages/cli 2>/dev/null || true

      - name: Verify Python imports
        env:
          PYTHONPATH: "packages/core/src:packages/cli/src:packages/api/src"
        run: |
          python -c "import openforge; print('core OK')"
          python -c "import openforge_cli; print('cli OK')"
          python -c "from openforge.project.model import Project; print('Project model OK')"
          python -c "from openforge.flow.full_flow import FullFlowRunner; print('Full flow OK')"

      - name: Run E2E smoke tests
        env:
          PYTHONPATH: "packages/core/src:packages/cli/src"
        run: pytest tests/e2e/ -v --tb=short
