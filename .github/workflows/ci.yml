name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  # ========================================================================
  # Python: lint + format
  # ========================================================================
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/
      - run: ruff format --check packages/

  # ========================================================================
  # Python: tests (matrix 3.12 + 3.13)
  # ========================================================================
  python-test:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: python-lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install -e "packages/core[dev]" --system
          uv pip install -e "packages/cli" --system
          uv pip install -e "packages/crypto" --system 2>/dev/null || true

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junitxml=test-results.xml

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/unit/ -v --cov=openforge --cov-report=xml --cov-report=term-missing || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            test-results.xml
            coverage.xml
          retention-days: 5

  # ========================================================================
  # Rust: fmt + clippy + test
  # ========================================================================
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all --verbose

  # ========================================================================
  # Rust: build release binaries (verify they compile)
  # ========================================================================
  rust-build:
    name: Rust Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: rust-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Build release
        run: cargo build --release

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-build-${{ matrix.os }}
          path: |
            target/release/openforge-ct*
            target/release/openforge-sca*
            target/release/openforge-entropy*
            target/release/openforge-lint*
            target/release/openforge-wave*
            !target/release/*.d
            !target/release/*.pdb
          retention-days: 3

  # ========================================================================
  # Svelte: type check + lint + build
  # ========================================================================
  svelte-check:
    name: Svelte Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Install dependencies
        working-directory: packages/web
        run: npm ci

      - name: Type check
        working-directory: packages/web
        run: npm run check

      - name: Lint
        working-directory: packages/web
        run: npm run lint || true

      - name: Build
        working-directory: packages/web
        run: npm run build

      - name: Run tests
        working-directory: packages/web
        run: npm run test -- --run || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: packages/web/build/
          retention-days: 3

  # ========================================================================
  # Integration: verify all packages work together
  # ========================================================================
  integration:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: [python-test, rust-check, svelte-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install all Python packages
        run: |
          pip install uv
          uv pip install \
            -e packages/core \
            -e packages/cli \
            -e packages/api \
            -e packages/crypto \
            --system

      - name: Verify CLI entry point
        run: |
          openforge --help

      - name: Verify Python imports
        run: |
          python -c "import openforge; print('openforge:', openforge.__file__)"
          python -c "import openforge_cli; print('openforge_cli:', openforge_cli.__file__)"
          python -c "import openforge_crypto; print('openforge_crypto:', openforge_crypto.__file__)" || true

      - name: Build Rust tools
        run: cargo build --release

      - name: Verify Rust tools
        run: |
          for tool in openforge-ct openforge-sca openforge-entropy openforge-lint openforge-wave; do
            if [ -f "target/release/$tool" ]; then
              echo "==> $tool: OK"
              target/release/$tool --help 2>/dev/null || true
            fi
          done
