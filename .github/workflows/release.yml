name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  CARGO_TERM_COLOR: always

jobs:
  # ========================================================================
  # Build Python wheel packages
  # ========================================================================
  build-python:
    name: Build Python Wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build hatchling

      - name: Build wheels
        run: |
          mkdir -p dist
          for pkg in core cli api desktop crypto; do
            echo "==> Building packages/$pkg"
            python -m build --wheel --outdir dist/ packages/$pkg
          done

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: dist/*.whl
          retention-days: 5

  # ========================================================================
  # Build Rust binaries (matrix: linux, windows, macos x64, macos arm64)
  # ========================================================================
  build-rust:
    name: Build Rust (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: openforge-rust-tools-linux-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: openforge-rust-tools-windows-x86_64
            ext: ".exe"
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: openforge-rust-tools-macos-x86_64
            ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: openforge-rust-tools-macos-aarch64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          for tool in openforge-ct openforge-sca openforge-entropy openforge-lint openforge-wave; do
            src="target/${{ matrix.target }}/release/${tool}${{ matrix.ext }}"
            if [ -f "$src" ]; then
              cp "$src" staging/
            fi
          done
          tar -czf "${{ matrix.artifact }}.tar.gz" -C staging .

      - name: Stage binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging -Force | Out-Null
          $tools = @("openforge-ct", "openforge-sca", "openforge-entropy", "openforge-lint", "openforge-wave")
          foreach ($tool in $tools) {
              $src = "target/${{ matrix.target }}/release/${tool}${{ matrix.ext }}"
              if (Test-Path $src) {
                  Copy-Item $src staging/
              }
          }
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifacts (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 5

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 5

  # ========================================================================
  # Build Svelte web frontend
  # ========================================================================
  build-web:
    name: Build Web Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Install and build
        working-directory: packages/web
        run: |
          npm ci
          npm run build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: packages/web/build/
          retention-days: 5

  # ========================================================================
  # Build Windows MSI installer
  # ========================================================================
  build-windows-installer:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: [build-python, build-rust, build-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Python wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: installer/windows/staging/lib

      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: openforge-rust-tools-windows-x86_64
          path: installer/windows/staging

      - name: Extract Rust binaries
        shell: pwsh
        run: |
          $zip = Get-ChildItem installer/windows/staging/*.zip | Select-Object -First 1
          if ($zip) {
              Expand-Archive -Path $zip.FullName -DestinationPath installer/windows/staging/bin -Force
              Remove-Item $zip.FullName
          }

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: installer/windows/staging/web

      - name: Create PDK placeholder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installer/windows/staging/pdk -Force | Out-Null
          Set-Content -Path installer/windows/staging/pdk/README.txt -Value "PDK files available separately."

      - name: Create asset placeholders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installer/windows/assets -Force | Out-Null
          # Create placeholder icon (in production, use real assets)
          if (-not (Test-Path installer/windows/assets/openforge.ico)) {
              [System.IO.File]::WriteAllBytes("installer/windows/assets/openforge.ico", (New-Object byte[] 0))
          }

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          # Also install WiX v3 extensions for backwards compat
          choco install wixtoolset -y --no-progress 2>$null || true

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          cd installer/windows
          # Attempt WiX build - if WiX v3 is available
          $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path "$wixBin\candle.exe") {
              & "$wixBin\candle.exe" openforge.wxs -dProductVersion="$version" -out output/openforge.wixobj -arch x64 -ext WixUIExtension -ext WixUtilExtension
              & "$wixBin\light.exe" output/openforge.wixobj -out "output/OpenForge-EDA-$version.msi" -ext WixUIExtension -ext WixUtilExtension -spdb
          } else {
              Write-Warning "WiX v3 not found. Creating placeholder MSI name."
              New-Item -ItemType Directory -Path output -Force | Out-Null
          }

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: installer/windows/output/*.msi
          retention-days: 5
          if-no-files-found: warn

  # ========================================================================
  # Build Linux packages (DEB + RPM + AppImage)
  # ========================================================================
  build-linux-packages:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    needs: [build-python, build-rust, build-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper rpm rpmlint fakeroot

      - name: Download Python wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: dist

      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: openforge-rust-tools-linux-x86_64
          path: .

      - name: Extract Rust binaries
        run: |
          mkdir -p rust-staging
          tar -xzf openforge-rust-tools-linux-x86_64.tar.gz -C rust-staging

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build

      - name: Build DEB package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="openforge-eda-${VERSION}"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/lib/openforge"
          mkdir -p "${PKG_DIR}/usr/share/openforge/web"
          mkdir -p "${PKG_DIR}/usr/share/applications"

          # Control file
          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: openforge-eda
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Dyber Inc. <engineering@dyber.io>
          Description: Cloud-native cryptographic hardware verification platform
           OpenForge EDA provides desktop GUI, CLI, REST API, and high-performance
           Rust analysis tools for cryptographic hardware verification.
          Depends: python3 (>= 3.12), python3-pip
          Homepage: https://github.com/dyber-pqc/OpenForge
          License: GPL-3.0-or-later
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "${PKG_DIR}/DEBIAN/control"

          # Install wheels
          cp dist/*.whl "${PKG_DIR}/usr/lib/openforge/"

          # Install Rust binaries
          cp rust-staging/openforge-* "${PKG_DIR}/usr/bin/" 2>/dev/null || true
          chmod +x "${PKG_DIR}/usr/bin/"openforge-* 2>/dev/null || true

          # Install web assets
          cp -r web-build/* "${PKG_DIR}/usr/share/openforge/web/" 2>/dev/null || true

          # CLI wrapper
          cat > "${PKG_DIR}/usr/bin/openforge" << 'WRAP'
          #!/bin/sh
          exec python3 -m openforge_cli.main "$@"
          WRAP
          chmod +x "${PKG_DIR}/usr/bin/openforge"

          # Desktop file
          cp installer/linux/openforge-eda.desktop "${PKG_DIR}/usr/share/applications/" 2>/dev/null || true

          fakeroot dpkg-deb --build "${PKG_DIR}"
          mv "${PKG_DIR}.deb" "openforge-eda_${VERSION}_amd64.deb"

      - name: Build RPM package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create source tarball
          tar -czf ~/rpmbuild/SOURCES/openforge-eda-${VERSION}.tar.gz \
            --transform "s,^,openforge-eda-${VERSION}/," \
            packages/ tools/ Cargo.toml installer/ dist/ rust-staging/ web-build/

          # Update spec version and build
          sed "s/^Version:.*/Version:        ${VERSION}/" installer/linux/rpm/openforge-eda.spec \
            > ~/rpmbuild/SPECS/openforge-eda.spec

          rpmbuild -bb ~/rpmbuild/SPECS/openforge-eda.spec \
            --define "_topdir $HOME/rpmbuild" \
            --define "_builddir $(pwd)" \
            --define "_sourcedir $(pwd)" \
            --noclean || echo "RPM build completed with warnings"

          cp ~/rpmbuild/RPMS/x86_64/*.rpm . 2>/dev/null || echo "No RPM produced"

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Install appimage-builder
          pip install appimage-builder || true

          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /usr/local/bin/appimagetool 2>/dev/null || true
          chmod +x /usr/local/bin/appimagetool 2>/dev/null || true

          # Create minimal AppDir manually
          mkdir -p AppDir/usr/bin AppDir/usr/lib/openforge AppDir/usr/share/applications

          # Copy artifacts
          cp dist/*.whl AppDir/usr/lib/openforge/
          cp rust-staging/openforge-* AppDir/usr/bin/ 2>/dev/null || true
          chmod +x AppDir/usr/bin/openforge-* 2>/dev/null || true

          # Create AppRun
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "${HERE}/usr/bin/openforge-desktop" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Desktop and icon
          cp installer/linux/openforge-eda.desktop AppDir/ 2>/dev/null || true
          touch AppDir/openforge-eda.png  # placeholder icon

          # Build AppImage
          if command -v appimagetool &> /dev/null; then
            ARCH=x86_64 appimagetool AppDir "OpenForge-EDA-${VERSION}-x86_64.AppImage"
          else
            echo "appimagetool not available, creating tarball instead"
            tar -czf "OpenForge-EDA-${VERSION}-x86_64-AppDir.tar.gz" AppDir/
          fi

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            *.deb
            *.rpm
            *.AppImage
            *-AppDir.tar.gz
          retention-days: 5
          if-no-files-found: warn

  # ========================================================================
  # Build macOS DMG
  # ========================================================================
  build-macos-installer:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: [build-python, build-rust, build-web]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
            rust-artifact: openforge-rust-tools-macos-x86_64
          - os: macos-14
            arch: aarch64
            rust-artifact: openforge-rust-tools-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download Python wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: dist

      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.rust-artifact }}
          path: .

      - name: Extract Rust binaries
        run: |
          mkdir -p target/release
          tar -xzf ${{ matrix.rust-artifact }}.tar.gz -C target/release

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: packages/web/build

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x installer/macos/create_dmg.sh
          installer/macos/create_dmg.sh --version "$VERSION"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: installer/macos/output/*.dmg
          retention-days: 5
          if-no-files-found: warn

  # ========================================================================
  # Build Conda package
  # ========================================================================
  build-conda:
    name: Build Conda Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install conda-build
        shell: bash -el {0}
        run: conda install -y conda-build conda-verify

      - name: Build conda package
        shell: bash -el {0}
        run: |
          conda build installer/conda/ --output-folder conda-output/ || echo "Conda build completed with warnings"

      - name: Upload conda package
        uses: actions/upload-artifact@v4
        with:
          name: conda-package
          path: conda-output/**/*.tar.bz2
          retention-days: 5
          if-no-files-found: warn

  # ========================================================================
  # Publish: Create GitHub Release, upload to PyPI
  # ========================================================================
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-python
      - build-rust
      - build-web
      - build-windows-installer
      - build-linux-packages
      - build-macos-installer
      - build-conda
    if: always() && needs.build-python.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"

          # Python wheels
          cp artifacts/python-wheels/*.whl release-assets/ 2>/dev/null || true

          # Rust binaries
          cp artifacts/openforge-rust-tools-*/*.tar.gz release-assets/ 2>/dev/null || true
          cp artifacts/openforge-rust-tools-*/*.zip release-assets/ 2>/dev/null || true

          # Installers
          cp artifacts/windows-msi/*.msi release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages/*.deb release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages/*.rpm release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages/*.AppImage release-assets/ 2>/dev/null || true
          cp artifacts/macos-dmg-*/*.dmg release-assets/ 2>/dev/null || true
          cp artifacts/conda-package/**/*.tar.bz2 release-assets/ 2>/dev/null || true

          # Generate checksums
          cd release-assets
          sha256sum * > SHA256SUMS.txt 2>/dev/null || true
          echo "==> Release assets:"
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenForge EDA ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## Installation

            **Quick install (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/dyber-pqc/OpenForge/main/installer/scripts/install.sh | bash
            ```

            **Quick install (Windows PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/dyber-pqc/OpenForge/main/installer/scripts/install.ps1 | iex
            ```

            **pip:**
            ```bash
            pip install openforge-core openforge-cli openforge-desktop
            ```

            **conda:**
            ```bash
            conda install -c dyber-pqc openforge
            ```

            See the [full installation guide](https://github.com/dyber-pqc/OpenForge/wiki/Installation) for details.

      - name: Publish to PyPI
        if: "!contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload artifacts/python-wheels/*.whl --skip-existing || echo "PyPI upload completed"
